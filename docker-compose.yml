version: '3.8'

services:
  # PostgreSQL Database with pgvector
  postgres:
    image: ankane/pgvector:latest
    container_name: decathlon_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-decathlonuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
      POSTGRES_DB: ${POSTGRES_DB:-decathlon_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-decathlonuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: decathlon_api
    environment:
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-decathlon_db}
      POSTGRES_USER: ${POSTGRES_USER:-decathlonuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
      
      # API
      API_KEY: ${API_KEY:-decathlon_smart_search_2024_secure_key_abc123xyz}
      
      # Force use of HF planner (production)
      USE_HF_PLANNER: "true"
      
      # Model cache (optional, speeds up model loading)
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/transformers
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount model cache to avoid re-downloading
      - model_cache:/app/.cache
      # Optional: mount logs
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app_network
    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

volumes:
  postgres_data:
    driver: local
  model_cache:
    driver: local

networks:
  app_network:
    driver: bridge
